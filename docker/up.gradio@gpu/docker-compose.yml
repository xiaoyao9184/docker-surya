

services:
  surya_llm:
    image: vllm/vllm-openai:v0.20.1
    container_name: surya_ocr_llm
    command:
      - "--model"
      - "datalab-to/surya-ocr-2"
      - "--no-enforce-eager"
      - "--max-num-seqs"
      - "24"
      - "--dtype"
      - "bfloat16"
      - "--max-model-len"
      - "18000"
      - "--max-num-batched-tokens"
      - "8192"
      - "--gpu-memory-utilization"
      - "0.85"
      - "--enable-prefix-caching"
      - "--mm-processor-kwargs"
      - '{"min_pixels": 3136, "max_pixels": 6291456}'
      - "--served-model-name"
      - "datalab-to/surya-ocr-2"
      - "--speculative-config"
      - '{"method": "mtp", "num_speculative_tokens": 2}'
    environment:
      - HF_HUB_OFFLINE=true
    ports:
      - 8000
    volumes:
      - ./../../cache:/root/.cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [ gpu ]

  surya_gradio:
    image: xiaoyao9184/surya:0.21.0
    container_name: surya_ocr_gradio
    working_dir: /workspace/gradio
    command: gradio gradio_app.py
    environment:
      - SURYA_INFERENCE_URL=http://surya_ocr_llm:8000/v1
      - TORCH_DEVICE=cuda
      - HF_HUB_OFFLINE=true
      - DETECTOR_MODEL_CHECKPOINT=/root/.cache/datalab/models/text_detection/2025_05_07
      - OCR_ERROR_MODEL_CHECKPOINT=/root/.cache/datalab/models/ocr_error_detection/2025_02_18
      - FAST_LAYOUT_MODEL_CHECKPOINT=/root/.cache/datalab/models/surya_layout2/0aee81d
      - FAST_ORDER_MODEL_CHECKPOINT=/root/.cache/datalab/models/surya_layout2/0aee81d/order
      - DOCKER_HF_CACHE_PATH=/root/.cache/huggingface
    ports:
      - "7860:7860"
    volumes:
      - ./../../cache:/root/.cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [ gpu ]
