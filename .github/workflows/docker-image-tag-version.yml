
name: Docker Image Build/Publish tag with version

on:
  push:
    branches:
      - 'master'
      - 'support/**'
    paths:
      - label/**
      - gradio/**
      - docker/build@pypi/dockerfile
      - .github/workflows/docker-image-tag-version.yml

jobs:
  build-and-push-docker-image:
    name: Build Docker image and push to repositories
    runs-on: ubuntu-latest
    permissions:
      packages: write

    strategy:
      matrix:
        platform:
          - linux/amd64

    steps:
      # Fix github action 'No space left on device'
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set env Surya git tag
        run: |
          git -C surya fetch --tags --force origin
          SURYA_GIT_TAG="$(git -C surya tag --points-at HEAD | sort -V | tail -n 1)"
          if [ -z "$SURYA_GIT_TAG" ]; then
            echo "No git tag found for current Surya submodule commit." >&2
            exit 1
          fi
          echo "SURYA_GIT_TAG=${SURYA_GIT_TAG#v}" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Meta data image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKERHUB_USERNAME }}/surya
            ghcr.io/${{ github.repository_owner }}/surya
          tags: |
            type=raw,value=${{ env.SURYA_GIT_TAG }}
            type=raw,value=latest
          flavor: |
            latest=false

      - name: Build push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/build@pypi/dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Print image digest
        run: echo ${{ steps.build.outputs.digest }}
